plugins {
    id 'java'
}

group = 'com.petboostingqol'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url 'https://repo.runelite.net' }
}

dependencies {
    compileOnly 'net.runelite:client:1.12.26.3'
    compileOnly 'com.google.inject:guice:4.1.0:no_aop'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.release = 11
}
